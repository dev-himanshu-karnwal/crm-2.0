name: CI (PR)

on:
  pull_request:
    branches:
      - dev
      - master

concurrency:
  group: pr-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Prettier check
        run: pnpm exec prettier --check "src/**/*.ts"

      - name: ESLint check
        run: pnpm exec eslint "src/**/*.ts"

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm run build

  pr-feedback:
    needs: ci
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Comment PR with CI result
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info('No pull_request payload found; skipping.');
              return;
            }

            const { owner, repo } = context.repo;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${context.runId}`;

            const result = '${{ needs.ci.result }}';

            let message;

            if (result === 'success') {
              message = `✅ CI passed\n\nRun: ${runUrl}`;
            } else if (result === 'failure') {
              message = `❌ CI failed\n\nFix issues before merging.\n\nRun: ${runUrl}`;
            } else if (result === 'cancelled') {
              message = `⚠️ CI cancelled\n\nRun: ${runUrl}`;
            } else {
              message = `ℹ️ CI status: ${result}\n\nRun: ${runUrl}`;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr.number,
              body: message,
            });